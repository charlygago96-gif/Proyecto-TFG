name: front_tfg
description: "Aplicación de asistencia por QR para alumnos y profesores."
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Peticiones HTTP a Spring Boot
  http: ^1.1.0

  # Generar códigos QR (Vista Profesor)
  qr_flutter: ^4.1.0

  # Escanear códigos QR (Vista Alumno)
  mobile_scanner: ^3.5.0

  # Notificaciones push locales
  flutter_local_notifications: ^17.2.2

  # Zonas horarias (necesario para programar notificaciones)
  timezone: ^0.9.4

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Iconos de iOS
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true