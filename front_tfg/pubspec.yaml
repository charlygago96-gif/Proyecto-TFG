name: front_tfg
description: "Aplicación de asistencia por QR para alumnos y profesores."
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  http: ^1.1.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.0
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  cupertino_icons: ^1.0.6
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/